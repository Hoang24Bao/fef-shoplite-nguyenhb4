<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopLite - Member Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">ShopLite</a>

                <a href="cart.html" class="btn btn-outline-light position-relative ms-auto me-2 order-lg-last">
                    Cart
                    <span id="cart-badge"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="register.html">Register</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5" style="max-width: 600px;">
        <div class="card p-4 shadow-sm bg-white">
            <h2 class="text-center mb-4 fw-bold text-primary">Member Registration</h2>

            <div id="form-success-banner" class="alert alert-success d-none" role="alert"></div>

            <form id="register-form">
                <div class="mb-3">
                    <label for="fullName" class="form-label fw-semibold">Full Name *</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name">
                    <div id="err-fullName" class="error-message"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email Address *</label>
                    <input type="text" class="form-control" id="email" placeholder="example@domain.com">
                    <div id="err-email" class="error-message"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password *</label>
                    <input type="password" class="form-control" id="password" placeholder="Minimum 6 characters">
                    <div id="err-password" class="error-message"></div>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label fw-semibold">Phone Number *</label>
                    <input type="text" class="form-control" id="phone" placeholder="Enter your contact number">
                    <div id="err-phone" class="error-message"></div>
                </div>

                <div class="mb-3">
                    <label for="categoryInterest" class="form-label fw-semibold">Interested Category</label>
                    <select class="form-select" id="categoryInterest">
                        <option value="electronics">Electronics</option>
                        <option value="jewelery">Jewelry</option>
                        <option value="men's clothing">Men's Clothing</option>
                        <option value="women's clothing">Women's Clothing</option>
                    </select>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="agreeTerms">
                    <label class="form-check-label" for="agreeTerms">
                        I agree to all terms and conditions *
                    </label>
                    <div id="err-agreeTerms" class="error-message"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    Complete Registration
                </button>
            </form>

            <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel"
                aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow-lg">
                        <div class="modal-header bg-success text-white">
                            <h5 class="modal-title fw-bold" id="successModalLabel">Registration Successful!</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                                aria-label="Close"></button>
                        </div>
                        <div class="modal-body text-center py-4">
                            <div class="fs-1 mb-3">🎉</div>
                            <p class="lead fw-semibold text-dark">Congratulations!</p>
                            <p class="text-muted">Your registration form is completely valid and has been submitted
                                successfully.</p>
                        </div>
                        <div class="modal-footer justify-content-center border-0">
                            <button type="button" class="btn btn-success px-4" data-bs-shadow
                                data-bs-dismiss="modal">OK</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 ShopLite Mini E-Commerce.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
